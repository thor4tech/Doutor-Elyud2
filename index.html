<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Elyud Freitas Advocacia</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              navy: '#0B203C',
              navyLight: '#162F50',
              gold: '#D4AF37',
              goldHover: '#B5952F',
              action: '#25D366',
              light: '#F6F7F8',
              textDark: '#374151',
              textLight: '#9CA3AF',
            },
            fontFamily: {
              serif: ['"Playfair Display"', 'serif'],
              sans: ['Inter', 'sans-serif'],
            },
            backgroundImage: {
              'navy-gradient': 'linear-gradient(135deg, #0B203C 0%, #162F50 100%)',
              'gold-gradient': 'linear-gradient(45deg, #BF953F, #FCF6BA, #B38728)',
            },
            boxShadow: {
              'navy': '0 10px 40px -10px rgba(11, 32, 60, 0.15)',
            }
          }
        }
      }
    </script>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
    
    <style>
      body {
        font-family: 'Inter', sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      h1, h2, h3, h4, h5, h6 {
        font-family: 'Playfair Display', serif;
      }
      /* Smooth Scrolling */
      html {
        scroll-behavior: smooth;
      }

      /* Custom Utilities */
      .text-gold-gradient {
        background: linear-gradient(45deg, #BF953F, #FCF6BA, #B38728);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        color: transparent;
        /* Fallback for non-supported browsers implicitly handled by CSS cascade if set correctly, 
           but here we assume modern browsers. */
      }

      .text-gold-gradient-hover:hover {
         background: linear-gradient(45deg, #BF953F, #FCF6BA, #B38728);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      /* Noise Texture */
      .bg-noise {
        position: relative;
      }
      .bg-noise::before {
        content: "";
        position: absolute;
        inset: 0;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.03'/%3E%3C/svg%3E");
        pointer-events: none;
        z-index: 1;
      }

      /* Button Shine Effect */
      .btn-shine {
        position: relative;
        overflow: hidden;
      }
      .btn-shine::after {
        content: '';
        position: absolute;
        top: 0;
        left: -100%;
        width: 50%;
        height: 100%;
        background: linear-gradient(to right, transparent, rgba(255,255,255,0.4), transparent);
        transform: skewX(-20deg);
        transition: 0.5s;
        pointer-events: none;
      }
      .btn-shine:hover::after {
        animation: shine 0.75s;
      }

      @keyframes shine {
        100% { left: 200%; }
      }

      /* Animations */
      .animate-fade-in-up {
        animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        opacity: 0;
        transform: translateY(20px);
      }
      
      @keyframes fadeInUp {
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .delay-100 { animation-delay: 100ms; }
      .delay-200 { animation-delay: 200ms; }
      .delay-300 { animation-delay: 300ms; }

      /* Booking Page Specifics */
      .gold-gradient-text {
        background: linear-gradient(135deg, #D4AF37 0%, #F3D576 50%, #D4AF37 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        color: transparent;
      }
      .gold-border-gradient {
        border-image: linear-gradient(135deg, #D4AF37, #F3D576, #D4AF37) 1;
      }
      /* Custom scrollbar for time slots */
      .time-slots::-webkit-scrollbar {
        width: 6px;
      }
      .time-slots::-webkit-scrollbar-track {
        background: #f1f1f1; 
      }
      .time-slots::-webkit-scrollbar-thumb {
        background: #cbd5e1; 
        border-radius: 10px;
      }
      .time-slots::-webkit-scrollbar-thumb:hover {
        background: #94a3b8; 
      }

    </style>
  <script type="importmap">
{
  "imports": {
    "lucide-react": "https://esm.sh/lucide-react@^0.563.0",
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/"
  }
}
</script>
</head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
